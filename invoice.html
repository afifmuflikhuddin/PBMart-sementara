<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice — Purbalingga Mart</title>
  <link rel="stylesheet" href="assets/css/invoice.css"/>
</head>
<body>

<!-- NAVBAR (hidden on print) -->
<nav class="inv-nav no-print">
  <a href="index.html" class="inv-nav-brand">
    <div class="inv-nav-logo">🏪</div>
    <span class="inv-nav-name">PURBALINGGA MART</span>
  </a>
  <div class="inv-nav-acts">
    <button class="inv-btn inv-btn-outline" id="inv-home-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Kembali Belanja
    </button>
    <button class="inv-btn inv-btn-outline" id="inv-orders-btn">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
      Pesanan Saya
    </button>
    <button class="inv-btn inv-btn-outline no-print" id="inv-share-btn">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Bagikan
    </button>
    <button class="inv-btn inv-btn-primary no-print" id="inv-print-btn">
      <svg viewBox="0 0 24 24"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      🖨️ Print Invoice
    </button>
  </div>
</nav>

<div class="inv-page">

  <!-- Status banner (hidden on print) -->
  <div class="inv-status-banner pending no-print" id="inv-status-banner">
    <div class="inv-status-icon">⏳</div>
    <div class="inv-status-info">
      <h3>Memuat status...</h3>
      <p>Sedang mengambil data invoice...</p>
    </div>
  </div>

  <!-- THE PRINTABLE INVOICE -->
  <div id="invoice-print-area">
    <!-- Filled by invoice.js -->
    <div style="padding:80px 20px;text-align:center;color:#94a3b8">
      <div style="font-size:40px;margin-bottom:12px">🧾</div>
      <div style="font-size:15px;font-weight:600;color:#475569">Memuat invoice...</div>
    </div>
  </div>

  <!-- Timeline (visible on screen, hidden on print by print CSS if you want) -->
  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-top:18px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.07)">
    <div class="inv-timeline">
      <div class="inv-timeline-title">📍 Riwayat Status Pesanan</div>
      <div class="inv-timeline-list" id="inv-timeline">
        <!-- Filled by invoice.js -->
        <div style="color:#94a3b8;font-size:13px;padding:8px 0">Memuat riwayat...</div>
      </div>
    </div>
  </div>

  <!-- Action bar at bottom (hidden on print) -->
  <div class="no-print" style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
    <button onclick="window.print()" class="inv-btn inv-btn-primary" style="flex:1;justify-content:center;padding:13px">
      <svg viewBox="0 0 24 24"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      🖨️ Print Bukti Pembayaran
    </button>
    <a href="orders.html" class="inv-btn inv-btn-outline" style="flex:1;justify-content:center;padding:13px">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>
      Lihat Semua Pesanan
    </a>
    <a href="index.html" class="inv-btn inv-btn-outline" style="flex:1;justify-content:center;padding:13px">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Lanjut Belanja
    </a>
  </div>

</div><!-- /inv-page -->

<!-- Scripts -->
<script src="auth.js"></script>
<script ></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/transaction.js"></script>
<script src="assets/js/invoice.js"></script>
</body>
</html>
