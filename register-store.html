    <h1 class="auth-card-title">Buat Akun Baru</h1>
    <p class="auth-card-sub">Daftar untuk mulai berbelanja produk UMKM lokal Purbalingga.</p>

    <!-- Alert -->
    <div class="auth-alert" id="reg-alert" role="alert">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="reg-alert-msg"></span>
    </div>

    <form id="reg-form" novalidate autocomplete="off" onsubmit="return false">

      <div class="form-grid">

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="reg-username">Username <span style="color:#ef4444">*</span></label>
          <div class="input-wrap">
            <svg class="fi" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input class="form-input" type="text" id="reg-username" placeholder="username_unik" maxlength="30" spellcheck="false" autocomplete="username"/>
          </div>
          <div class="field-err" id="reg-username-err"></div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="reg-email">Email <span style="color:#ef4444">*</span></label>
          <div class="input-wrap">
            <svg class="fi" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input class="form-input" type="email" id="reg-email" placeholder="email@domain.com" autocomplete="email"/>
          </div>
          <div class="field-err" id="reg-email-err"></div>
        </div>

        <!-- Nama Lengkap -->
        <div class="form-group form-full">
          <label class="form-label" for="reg-owner">Nama Lengkap <span style="color:#ef4444">*</span></label>
          <div class="input-wrap">
            <svg class="fi" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input class="form-input" type="text" id="reg-owner" placeholder="Nama lengkap Anda" maxlength="50" autocomplete="name"/>
          </div>
          <div class="field-err" id="reg-owner-err"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="reg-password">Password <span style="color:#ef4444">*</span></label>
          <div class="input-wrap">
            <svg class="fi" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 karakter" style="padding-right:44px" autocomplete="new-password"/>
            <button type="button" class="pass-toggle" id="pass-toggle-1" aria-label="Tampilkan password">
              <svg viewBox="0 0 24 24" width="17" height="17"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pass-strength" style="margin-top:7px">
            <div class="strength-bars">
              <div class="strength-bar"></div><div class="strength-bar"></div>
              <div class="strength-bar"></div><div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <div class="strength-text" id="strength-label"></div>
          </div>
          <div class="field-err" id="reg-password-err"></div>
        </div>

        <!-- Konfirmasi Password -->
        <div class="form-group">
          <label class="form-label" for="reg-confirm-pass">Konfirmasi Password <span style="color:#ef4444">*</span></label>
          <div class="input-wrap">
            <svg class="fi" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input class="form-input" type="password" id="reg-confirm-pass" placeholder="Ulangi password" style="padding-right:44px" autocomplete="new-password"/>
            <button type="button" class="pass-toggle" id="pass-toggle-2" aria-label="Tampilkan password">
              <svg viewBox="0 0 24 24" width="17" height="17"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-err" id="reg-confirm-pass-err"></div>
        </div>

      </div>

      <!-- Terms -->
      <div class="terms-check" style="margin:18px 0">
        <input type="checkbox" id="reg-terms"/>
        <label for="reg-terms">
          Saya menyetujui <a href="#" onclick="return false">Syarat &amp; Ketentuan</a> dan
          <a href="#" onclick="return false">Kebijakan Privasi</a> Purbalingga Mart
        </label>
      </div>

      <!-- Info box -->
      <div style="background:#fff8e8;border:1px solid #fde8b4;border-radius:9px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:18px;flex-shrink:0">✅</span>
        <div style="font-size:12.5px;color:#7a4f00;line-height:1.6">
          <strong>Gratis &amp; langsung aktif!</strong> Ingin berjualan? Setelah daftar dan login, pilih
          <strong>🏪 Buka Toko</strong> di menu profil untuk mendaftarkan toko UMKM Anda.
        </div>
      </div>

      <!-- Submit -->
      <button type="button" class="form-submit" id="reg-submit">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
        Daftar Sekarang
      </button>

    </form>

    <div class="auth-footer-text" style="margin-top:20px">
      Sudah punya akun? <a href="login.html">Masuk di sini →</a>
    </div>
    <div class="auth-footer-text" style="margin-top:6px">
      <a href="index.html" style="color:#94a3b8;font-weight:500">← Kembali ke Marketplace</a>
    </div>

  </div>
</div>

<script src="auth.js"></script>
<script src="assets/js/register.js"></script>
</body>
</html>
